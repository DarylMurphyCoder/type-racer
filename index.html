<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <title>Type Racer</title>
</head>
<body>
    




    <header class="bg-light border-bottom">
        <div class="container py-3 d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0">TypeRacer</h1>
            <button id="btn-instructions" class="btn btn-outline-primary">Instructions</button>
        </div>
    </header>

    <main class="container my-4">
        <div class="row g-4">
            <!-- Test area: left column (full width on small, 8/12 on md+) -->
            <section class="col-12 col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <!-- Difficulty selector using Bootstrap input-group -->
                        <div class="mb-3">
                            <label class="form-label">Select Difficulty</label>
                            <div class="input-group">
                                <label class="input-group-text" for="difficulty-select">Difficulty</label>
                                <select id="difficulty-select" class="form-select" aria-label="Select Difficulty">
                                    <option value="easy">Easy</option>
                                    <option value="medium">Medium</option>
                                    <option value="hard">Hard</option>
                                </select>
                            </div>
                        </div>

                        <!-- Sample text to type -->
                        <div class="mb-3">
                            <label class="form-label">Text to type</label>
                            <div class="p-3 border rounded bg-white" id="sample-text">
                                <p class="mb-0">The quick brown fox jumps over the lazy dog. Practice typing to improve speed and accuracy. Focus on rhythm and correct keystrokes rather than rushing.</p>
                            </div>
                        </div>

                        <!-- Typing input area -->
                        <div class="mb-3">
                            <label class="form-label visually-hidden" for="typing-input">Type here</label>
                            <textarea id="typing-input" class="form-control" rows="4" placeholder="Start typing here..." aria-label="Typing input"></textarea>
                        </div>

                        <!-- Controls -->
                        <div class="d-flex gap-2">
                            <button id="btn-start" class="btn btn-primary">Start</button>
                            <button id="btn-stop" class="btn btn-secondary">Stop</button>
                            <button id="btn-retry" class="btn btn-outline-danger">Retry</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Results area: right column (full width on small, 4/12 on md+) -->
            <aside class="col-12 col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="h6">Results</h2>
                        <dl class="row mb-0">
                            <dt class="col-5">Level</dt>
                            <dd class="col-7"><span id="result-level">-</span></dd>

                            <dt class="col-5">Time</dt>
                            <dd class="col-7"><span id="result-time">-</span></dd>

                            <dt class="col-5">WPM</dt>
                            <dd class="col-7"><span id="result-wpm">-</span></dd>

                            <dt class="col-5">Accuracy</dt>
                            <dd class="col-7"><span id="result-accuracy">-</span></dd>
                        </dl>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/YOUR-KIT-CODE-HERE.js" crossorigin="anonymous"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
